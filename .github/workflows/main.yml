name: Flutter Docker CI/CD

on:
  push:
    branches:
      - nhathuy

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Docker Image
        run: docker build -t fruit-store-builder ./fruit_store

      - name: Create Container
        run: docker create --name fruit-store-container fruit-store-builder

      - name: Copy APK
        run: |
          docker cp fruit-store-container:/app/build/app/outputs/flutter-apk/app-release.apk ./app-release.apk

      - name: Remove Container
        run: docker rm fruit-store-container

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fruit-store-apk
          path: app-release.apk

      - name: Create Tag
        run: |
          TAG=build-${{ github.run_number }}
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: |
            Automatic release generated by GitHub Actions.

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
          files: app-release.apk
